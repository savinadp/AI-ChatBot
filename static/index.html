<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI ChatBot</title>
  <style>
    body { font-family: system-ui, Arial; margin: 0; background:#0b0f14; color:#e8eef5; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .top { display:flex; gap:10px; align-items:center; justify-content:space-between; }
    .card { background:#121a24; border:1px solid #223042; border-radius:14px; padding:14px; }
    #chat { height: 70vh; overflow:auto; padding:12px; }
    .msg { margin: 10px 0; display:flex; }
    .msg.you { justify-content:flex-end; }
    .bubble { max-width: 78%; padding:10px 12px; border-radius:14px; white-space:pre-wrap; line-height:1.35; }
    .you .bubble { background:#1f6feb; color:white; border-bottom-right-radius:6px; }
    .bot .bubble { background:#1a2533; border:1px solid #27374d; border-bottom-left-radius:6px; }
    .row { display:flex; gap:10px; margin-top:10px; }
    input { flex:1; padding:12px; border-radius:12px; border:1px solid #2a3b52; background:#0f1620; color:#e8eef5; }
    button, select { padding:12px; border-radius:12px; border:1px solid #2a3b52; background:#0f1620; color:#e8eef5; cursor:pointer; }
    button:hover { background:#132033; }
    .muted { color:#9db0c7; font-size: 0.95em; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h2 style="margin:0 0 4px 0;">AI ChatBot</h2>
        <div class="muted">Savina's AI World</div>
      </div>
      <div class="card">
        <div class="muted" style="margin-bottom:6px;">Model</div>
        <select id="model">
          <option value="">(server default)</option>
          <option value="llama3.1:8b-q4_K_M">llama3.1:8b-q4_K_M</option>
          <option value="llama3.1:8b">llama3.1:8b</option>
          <option value="llama3.2:1b">llama3.2:1b</option>
          <option value="deepseek-r1:7b">deepseek-r1:7b</option>
        </select>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <div id="chat"></div>

      <div class="row">
        <input id="input" placeholder="Message..." autocomplete="off" />
        <button onclick="send()">Send</button>
        <button onclick="resetChat()">Reset</button>
      </div>
    </div>
  </div>

<script>
  // Chat memory (kept in browser tab)
  let messages = [
    { role: "system", content: "You are a helpful assistant like ChatGPT. Be clear and friendly." }
  ];

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "msg " + (role === "user" ? "you" : "bot");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function resetChat() {
    messages = messages.slice(0,1);
    chat.innerHTML = "";
    addBubble("assistant", "Reset ✅ How can I help?");
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    addBubble("user", text);
    messages.push({ role: "user", content: text });

    // typing placeholder
    addBubble("assistant", "...");
    const placeholder = chat.lastChild;

    const model = document.getElementById("model").value;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, model: model || null })
      });
      const data = await res.json();

      const reply = data.message?.content ?? "No response.";
      messages.push({ role: "assistant", content: reply });

      // replace placeholder
      placeholder.querySelector(".bubble").textContent = reply;
    } catch (e) {
      placeholder.querySelector(".bubble").textContent = "Error: " + e;
    }
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });

  addBubble("assistant", "Hi! I’m your local assistant. Ask me anything 🙂");
</script>
</body>
</html>
